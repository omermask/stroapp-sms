name: stroapp_user
description: "StroApp SMS - User Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  firebase_messaging: ^15.2.2
  flutter_local_notifications: ^18.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  pull_to_refresh: ^2.0.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  local_auth: ^2.3.0
  flutter_dotenv: ^5.2.1
  crypto: ^3.0.6
  font_awesome_flutter: ^10.8.0
  path_provider: ^2.1.5
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env

  fonts:
    - family: QasehIcons
      fonts:
        - asset: assets/icon/QasehIcons.ttf
