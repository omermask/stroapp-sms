upstream stroapp {
    server api:9527;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# WAF: Block common attack patterns
map $request_uri $is_attack {
    default 0;
    "~*(?i)(select\s.*from|union\s.*select|insert\s.*into|drop\s+table|--|;)" 1;
    "~*(?i)(<script|javascript:|onerror=|onload=)" 1;
    "~*(?i)(etc/passwd|proc/self|../|..\\\)" 1;
    "~*(?i)(\bexec\b|\bping\b|\bwget\b|\bcurl\b|\bbase64_decode)" 1;
    "~*(\0|%00)" 1;
}

server {
    listen 80;
    server_name stroapp.com www.stroapp.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stroapp.com www.stroapp.com;

    ssl_certificate /etc/letsencrypt/live/stroapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stroapp.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-${request_id}' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; frame-src https://challenges.cloudflare.com; img-src 'self' data:; connect-src 'self' https://onesignal.com; base-uri 'self'; form-action 'self'" always;

    # Request limits
    limit_req zone=api_limit burst=50 nodelay;
    limit_conn conn_limit 20;
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # WAF: Block attacks
    if ($is_attack) {
        return 403;
    }

    # Hide nginx version
    server_tokens off;

    location / {
        proxy_pass http://stroapp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    location /stroapp/v1/user/auth/ {
        limit_req zone=auth_limit burst=2 nodelay;
        proxy_pass http://stroapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
    }

    location /stroapp/v4/admin/api/login {
        limit_req zone=auth_limit burst=2 nodelay;
        proxy_pass http://stroapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
    }

    location /stroapp/static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /stroapp/metrics {
        internal;
        proxy_pass http://stroapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /stroapp/v1/$1 break;
        proxy_pass http://stroapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
    }
}
